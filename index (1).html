</html><!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Parfum Pinky</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ffe4ec;
}

/* NAVBAR */
.navbar {
    background: #ff4da6;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: white;
}

.navbar input {
    width: 50%;
    padding: 8px;
    border-radius: 20px;
    border: none;
}

/* BANNER */
.banner {
    width: 100%;
    height: 180px;
    overflow: hidden;
    position: relative;
}

.banner img {
    width: 100%;
    height: 180px;
    position: absolute;
    animation: slide 10s infinite;
}

@keyframes slide {
    0% {left:0}
    33% {left:0}
    36% {left:-100%}
    66% {left:-100%}
    69% {left:-200%}
    100% {left:-200%}
}

/* PRODUK */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 10px;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 8px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 10px;
}

.title {
    font-size: 14px;
}

.price {
    color: #ff3385;
    font-weight: bold;
}

button {
    width: 100%;
    background: #ff4da6;
    border: none;
    color: white;
    padding: 6px;
    border-radius: 10px;
}

/* CART */
.cart {
    position: fixed;
    right: 10px;
    bottom: 10px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    width: 230px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

input {
    width: 100%;
    margin-top: 5px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <b>Eca Shop🛍</b>
    <input type="text" placeholder="Cari parfum...">
</div>

<!-- BANNER -->
<div class="banner">
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
<img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30">
<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de">
</div>

<!-- PRODUK -->
<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224fbe4">
<p class="title">Chanel Perfume</p>
<p class="price">Rp 250.000</p>
<button onclick="addCart('Chanel Perfume')">+ Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de">
<p class="title">Dior Perfume</p>
<p class="price">Rp 300.000</p>
<button onclick="addCart('Dior Perfume')">+ Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1594035910387-fea47794261f">
<p class="title">Gucci Perfume</p>
<p class="price">Rp 280.000</p>
<button onclick="addCart('Gucci Perfume')">+ Keranjang</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6">
<p class="title">Versace Perfume</p>
<p class="price">Rp 320.000</p>
<button onclick="addCart('Versace Perfume')">+ Keranjang</button>
</div>

</div>

<!-- CART -->
<div class="cart">
<h4>🛒 Keranjang</h4>
<ul id="list"></ul>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="alamat" placeholder="Alamat">

<br><br>
<button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];

function addCart(item){
    cart.push(item);
    render();
}

function render(){
    let list = document.getElementById("list");
    list.innerHTML="";
    cart.forEach(i=>{
        let li=document.createElement("li");
        li.innerText=i;
        list.appendChild(li);
    });
}

function checkout(){
    let nama=document.getElementById("nama").value;
    let alamat=document.getElementById("alamat").value;

    if(nama==""||alamat==""){
        alert("Isi nama dan alamat!");
    }else{
        alert("Pesanan "+nama+" berhasil dikirim!");
    }
}
</script>

</body>
</html>
